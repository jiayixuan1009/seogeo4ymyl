# 生产主域名：https://seo.cryptooptiontool.com/
# 若另有 listen 443 ssl 的站点块，请使用相同 server_name，并配置该域名的证书。
#
# Rate limit /api at the edge (covers multiple Node workers behind PM2 cluster)
limit_req_zone $binary_remote_addr zone=seotool_api:10m rate=120r/m;

upstream seotool_node {
    server 127.0.0.1:3000;
    keepalive 32;
}

# 仅响应此 Host；与 Cloudflare / DNS 中的主域名保持一致。
server {
    listen 80;
    server_name seo.cryptooptiontool.com;

    root /var/www/seotool;
    index index.html;

    # Backend: Express (server.js) — scraping proxy, LLM proxy, optional static dist
    location /api/ {
        limit_req zone=seotool_api burst=40 nodelay;
        proxy_pass http://seotool_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # SPA (Vite) history fallback — static assets from root
    location / {
        try_files $uri $uri/ /index.html;
    }
}
