# 生产主域名：https://seo.cryptooptiontool.com/
# Cloudflare Full (Strict) 模式下，Cloudflare ↔ Origin 也需 TLS。
# 配合 certbot / acme.sh 签发的 Let's Encrypt 或 Cloudflare Origin Certificate。
#
# Rate limit /api at the edge (covers multiple Node workers behind PM2 cluster)
limit_req_zone $binary_remote_addr zone=seotool_api:10m rate=120r/m;

upstream seotool_node {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name seo.cryptooptiontool.com;
    return 301 https://$host$request_uri;
}

# HTTPS — 主站点块
server {
    listen 443 ssl http2;
    server_name seo.cryptooptiontool.com;

    # 证书路径（按实际情况修改）
    ssl_certificate     /etc/ssl/certs/seo.cryptooptiontool.com.pem;
    ssl_certificate_key /etc/ssl/private/seo.cryptooptiontool.com.key;

    # TLS 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    root /var/www/seotool;
    index index.html;

    # Backend: Express (server.js) — scraping proxy, LLM proxy, optional static dist
    location /api/ {
        limit_req zone=seotool_api burst=40 nodelay;
        proxy_pass http://seotool_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # SPA (Vite) history fallback — static assets from root
    location / {
        try_files $uri $uri/ /index.html;
    }
}
