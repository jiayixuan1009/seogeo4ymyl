# build：与 Vite 8 的 Node 要求一致（^20.19 或 >=22.12）
# 构建与 rsync 在同一 job 内完成，跳过 upload-artifact / download-artifact（避免 artifact 权限与多 job 失败点）
# Action 运行时迁 Node 24：见 https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/

name: Deploy to server

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# setup-node 的 cache: npm 会读/写 Actions Cache，需 actions: write（仅 contents: read 时缓存步骤会 403 导致整 job 失败）
permissions:
  contents: read
  actions: write

concurrency:
  group: deploy-seotool
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # 与 Vite 8 一致：^20.19（构建用 Node；与 Action 自身 Node 24 无关）
      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.6'
          cache: npm

      - name: Print toolchain
        run: node -v && npm -v

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Build frontend
        run: npm run build

      - name: Verify dist
        run: |
          set -euo pipefail
          test -f dist/index.html
          ls -la dist/

      # 与原先 deploy job 等价；失败不导致整 job 失败（等同原 continue-on-error: true）
      - name: Rsync dist + Node 入口，并 reload PM2
        continue-on-error: true
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          if [ -z "${DEPLOY_HOST:-}" ] || [ -z "${DEPLOY_USER:-}" ] || [ -z "${DEPLOY_PATH:-}" ] || [ -z "${DEPLOY_SSH_KEY:-}" ]; then
            echo "::notice title=Skip deploy::未配置 DEPLOY_HOST / DEPLOY_USER / DEPLOY_PATH / DEPLOY_SSH_KEY 时跳过 rsync。"
            exit 0
          fi
          set -eo pipefail
          PORT="${DEPLOY_SSH_PORT:-22}"
          if [ -z "$PORT" ]; then PORT=22; fi
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          SSH_OPTS="-i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -p $PORT"
          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"
          QPATH=$(printf '%q' "$DEPLOY_PATH")
          echo "Rsync dist -> ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"
          rsync -avz --delete -e "ssh $SSH_OPTS" dist/ "$REMOTE:$DEPLOY_PATH/"
          rsync -avz -e "ssh $SSH_OPTS" \
            server.js package.json package-lock.json ecosystem.config.cjs \
            "$REMOTE:$DEPLOY_PATH/"
          ssh $SSH_OPTS "$REMOTE" "cd $QPATH && npm ci --omit=dev --no-audit --fund=false && if command -v pm2 >/dev/null 2>&1; then \
            if pm2 describe seotool-proxy-server >/dev/null 2>&1; then \
              pm2 reload seotool-proxy-server --update-env; \
            else \
              pm2 start ecosystem.config.cjs; \
            fi; \
          else \
            echo 'PM2 not found; run: node server.js in site dir'; \
          fi"
