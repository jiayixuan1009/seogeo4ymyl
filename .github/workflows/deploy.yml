# 构建 + 可选 rsync。Secrets：DEPLOY_HOST, DEPLOY_USER, DEPLOY_PATH, DEPLOY_SSH_KEY（可选 DEPLOY_SSH_PORT）

name: Deploy to server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-seotool
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # 让仍基于 Node20 的 Action 在 Node24 上跑，减少弃用告警（官方 Changelog 2025-09-19）
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Build frontend
        run: npm run build

      - name: Verify dist
        run: test -f dist/index.html && ls -la dist/

      - name: Rsync dist + Node 入口，并 reload PM2
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          set -eo pipefail
          if [ -z "${DEPLOY_HOST:-}" ] || [ -z "${DEPLOY_USER:-}" ] || [ -z "${DEPLOY_PATH:-}" ] || [ -z "${DEPLOY_SSH_KEY:-}" ]; then
            echo "::notice title=Skip deploy::Add DEPLOY_HOST, DEPLOY_USER, DEPLOY_PATH, DEPLOY_SSH_KEY in repo Secrets to enable rsync."
            exit 0
          fi
          PORT="${DEPLOY_SSH_PORT:-22}"
          if [ -z "$PORT" ]; then PORT=22; fi
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          SSH_OPTS="-i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -p $PORT"
          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"
          QPATH=$(printf '%q' "$DEPLOY_PATH")
          echo "Rsync dist -> ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"
          rsync -avz --delete -e "ssh $SSH_OPTS" dist/ "$REMOTE:$DEPLOY_PATH/"
          rsync -avz -e "ssh $SSH_OPTS" \
            server.js package.json package-lock.json ecosystem.config.cjs \
            "$REMOTE:$DEPLOY_PATH/"
          ssh $SSH_OPTS "$REMOTE" "cd $QPATH && npm ci --omit=dev --no-audit --fund=false && if command -v pm2 >/dev/null 2>&1; then \
            if pm2 describe seotool-proxy-server >/dev/null 2>&1; then \
              pm2 reload seotool-proxy-server --update-env; \
            else \
              pm2 start ecosystem.config.cjs; \
            fi; \
          else \
            echo 'PM2 not found; run: node server.js in site dir'; \
          fi"
