# 第一性原理：
# - 「能否构建」是 CI 的唯一硬门槛 → build 失败 = 整条 workflow 失败（应修复代码）。
# - 「是否成功上云」依赖密钥、网络、服务器环境 → 与代码正确性正交 → 不得绑架绿勾。
#   故 deploy job 使用 continue-on-error: true：SSH/rsync/PM2 失败时仅标黄，Summary 仍为成功。
#
# Secrets（仅 deploy 需要）：DEPLOY_HOST, DEPLOY_USER, DEPLOY_PATH, DEPLOY_SSH_KEY（可选 DEPLOY_SSH_PORT）

name: Deploy to server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-seotool
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Build frontend
        run: npm run build

      - name: Verify dist
        run: test -f dist/index.html && ls -la dist/

      - name: Upload dist for deploy job
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    needs: build
    # 部署失败不导致 workflow 失败（GitHub 会在本 job 上显示警告，便于你点开看日志）
    continue-on-error: true
    runs-on: ubuntu-latest
    # 注意：job 的 if 里不能使用 secrets 上下文；是否部署在下方 shell 里判断。
    steps:
      - uses: actions/checkout@v6

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Rsync dist + Node 入口，并 reload PM2
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          if [ -z "${DEPLOY_HOST:-}" ] || [ -z "${DEPLOY_USER:-}" ] || [ -z "${DEPLOY_PATH:-}" ] || [ -z "${DEPLOY_SSH_KEY:-}" ]; then
            echo "::notice title=Skip deploy::未配置 DEPLOY_HOST / DEPLOY_USER / DEPLOY_PATH / DEPLOY_SSH_KEY 时跳过 rsync。"
            exit 0
          fi
          set -eo pipefail
          PORT="${DEPLOY_SSH_PORT:-22}"
          if [ -z "$PORT" ]; then PORT=22; fi
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          SSH_OPTS="-i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -p $PORT"
          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"
          QPATH=$(printf '%q' "$DEPLOY_PATH")
          echo "Rsync dist -> ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"
          rsync -avz --delete -e "ssh $SSH_OPTS" dist/ "$REMOTE:$DEPLOY_PATH/"
          rsync -avz -e "ssh $SSH_OPTS" \
            server.js package.json package-lock.json ecosystem.config.cjs \
            "$REMOTE:$DEPLOY_PATH/"
          ssh $SSH_OPTS "$REMOTE" "cd $QPATH && npm ci --omit=dev --no-audit --fund=false && if command -v pm2 >/dev/null 2>&1; then \
            if pm2 describe seotool-proxy-server >/dev/null 2>&1; then \
              pm2 reload seotool-proxy-server --update-env; \
            else \
              pm2 start ecosystem.config.cjs; \
            fi; \
          else \
            echo 'PM2 not found; run: node server.js in site dir'; \
          fi"
